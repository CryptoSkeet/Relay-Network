# .github/workflows/deploy-registry.yml
#
# Compile and deploy the relay_agent_registry Anchor program to Solana devnet.
# Secrets required:
#   DEPLOY_KEYPAIR   — wallet JSON array with devnet SOL (payer)
#   PROGRAM_KEYPAIR  — program keypair JSON array (relay_agent_registry-keypair.json)

name: Deploy Relay Agent Registry

on:
  push:
    branches: [main]
    # Only run when the on-chain program or this workflow itself changes.
    # Avoids a red check on every unrelated app commit.
    paths:
      - 'programs/**'
      - '.github/workflows/deploy-registry.yml'
  workflow_dispatch:

env:
  ANCHOR_VERSION: '0.31.0'
  SOLANA_VERSION: '3.1.13'
  RUST_TOOLCHAIN: '1.86.0'
  PROGRAM_NAME: relay_agent_registry

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Cache Rust/Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            programs/relay_agent_registry/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('programs/relay_agent_registry/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          set -euo pipefail
          # Use the official installer with retries — pulling the bz2 archive
          # straight from the GitHub release was returning 504s.
          for attempt in 1 2 3 4 5; do
            if sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"; then
              break
            fi
            echo "Solana installer attempt $attempt failed — retrying in 10s"
            sleep 10
          done
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH
          "$HOME/.local/share/solana/install/active_release/bin/solana" --version

      - name: Cache Anchor CLI
        id: cache-anchor
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/anchor
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}

      - name: Install Anchor CLI
        if: steps.cache-anchor.outputs.cache-hit != 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked --force

      - name: Verify toolchain
        run: |
          solana --version
          anchor --version
          rustc --version

      - name: Configure Solana CLI
        run: |
          solana config set --url devnet
          echo '${{ secrets.DEPLOY_KEYPAIR }}' > /tmp/payer.json
          solana config set --keypair /tmp/payer.json

      - name: Write program keypair
        run: |
          mkdir -p programs/relay_agent_registry/deploy
          echo '${{ secrets.PROGRAM_KEYPAIR }}' > programs/relay_agent_registry/deploy/relay_agent_registry-keypair.json

      - name: Seed program keypair for Anchor build
        working-directory: programs
        run: |
          rm -f Cargo.lock
          mkdir -p target/deploy
          cp relay_agent_registry/deploy/relay_agent_registry-keypair.json target/deploy/relay_agent_registry-keypair.json

      - name: Build program
        working-directory: programs
        run: anchor build

      - name: Verify program ID
        working-directory: programs
        run: |
          PROGRAM_ID=$(solana-keygen pubkey relay_agent_registry/deploy/relay_agent_registry-keypair.json)
          echo "Program ID: $PROGRAM_ID"
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV

      - name: Deploy program
        working-directory: programs
        run: |
          echo "Deploying to devnet..."
          solana program deploy \
            --program-id relay_agent_registry/deploy/relay_agent_registry-keypair.json \
            --keypair /tmp/payer.json \
            --url devnet \
            target/deploy/relay_agent_registry.so

      - name: Verify deployment
        run: |
          solana program show "$PROGRAM_ID" --url devnet

      - name: Upload IDL on-chain
        working-directory: programs
        run: |
          echo "Uploading IDL for $PROGRAM_ID..."
          # Install peer dep @solana/kit alongside the metadata CLI to avoid MODULE_NOT_FOUND
          npm install --no-save @solana/kit @solana-program/program-metadata
          npx @solana-program/program-metadata write idl \
            "$PROGRAM_ID" \
            target/idl/relay_agent_registry.json \
            --keypair /tmp/payer.json \
            --rpc https://api.devnet.solana.com

      - name: Install solana-verify
        run: |
          cargo install solana-verify --locked || true
          solana-verify --version

      - name: Verify program against this repo
        env:
          REPO_URL: https://github.com/${{ github.repository }}
          COMMIT: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          echo "Verifying $PROGRAM_ID against $REPO_URL @ $COMMIT"
          solana-verify verify-from-repo \
            --url devnet \
            --program-id "$PROGRAM_ID" \
            --library-name relay_agent_registry \
            --mount-path programs \
            --commit-hash "$COMMIT" \
            --keypair /tmp/payer.json \
            --base-image solanafoundation/solana-verifiable-build:3.1.10 \
            "$REPO_URL"
          STATUS=$?
          if [ $STATUS -eq 0 ]; then
            echo "✅ Program verified."
          else
            echo "::warning::verify-from-repo exit=$STATUS — hash mismatch or Docker unavailable."
          fi
          exit 0

      - name: Clean up keypairs
        if: always()
        run: rm -f /tmp/payer.json
