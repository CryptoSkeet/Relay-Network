# .github/workflows/deploy-registry.yml
#
# Compile and deploy the relay_agent_registry Anchor program to Solana devnet.
# Secrets required:
#   DEPLOY_KEYPAIR   — wallet JSON array with devnet SOL (payer)
#   PROGRAM_KEYPAIR  — program keypair JSON array (relay_agent_registry-keypair.json)

name: Deploy Relay Agent Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ANCHOR_VERSION: '0.30.1'
  SOLANA_VERSION: '1.18.17'
  RUST_TOOLCHAIN: '1.79.0'
  PROGRAM_NAME: relay_agent_registry

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Rust/Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            programs/relay_agent_registry/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('programs/relay_agent_registry/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI
        run: |
          set -euo pipefail
          INSTALL_OK=0
          for INSTALL_URL in \
            "https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install" \
            "https://release.solana.com/v${{ env.SOLANA_VERSION }}/install"; do
            echo "Trying Solana installer: $INSTALL_URL"
            if curl -sSfL --retry 5 --retry-delay 2 --retry-all-errors "$INSTALL_URL" | sh; then
              INSTALL_OK=1
              break
            fi
          done
          if [ "$INSTALL_OK" -ne 1 ]; then
            echo "ERROR: Failed to install Solana CLI from all installer URLs"
            exit 1
          fi
          SOLANA_BIN_DIR="$HOME/.local/share/solana/install/active_release/bin"
          if [ ! -x "$SOLANA_BIN_DIR/solana" ]; then
            SOLANA_BIN="$(find "$HOME/.local/share/solana/install" -type f -name solana | head -n 1)"
            if [ -z "$SOLANA_BIN" ]; then
              echo "ERROR: Solana binary not found after install"
              exit 1
            fi
            SOLANA_BIN_DIR="$(dirname "$SOLANA_BIN")"
          fi
          echo "$SOLANA_BIN_DIR" >> $GITHUB_PATH
          "$SOLANA_BIN_DIR/solana" --version

      - name: Install Anchor CLI
        run: |
          npm install -g @coral-xyz/anchor-cli@${{ env.ANCHOR_VERSION }}

      - name: Verify toolchain
        run: |
          solana --version
          anchor --version
          rustc --version

      - name: Configure Solana CLI
        run: |
          solana config set --url devnet
          echo '${{ secrets.DEPLOY_KEYPAIR }}' > /tmp/payer.json
          solana config set --keypair /tmp/payer.json

      - name: Write program keypair
        run: |
          mkdir -p programs/relay_agent_registry/deploy
          echo '${{ secrets.PROGRAM_KEYPAIR }}' > programs/relay_agent_registry/deploy/relay_agent_registry-keypair.json

      - name: Build program
        working-directory: programs
        run: anchor build

      - name: Verify program ID
        working-directory: programs
        run: |
          EXPECTED="Hs1hX4pSZSAQKLgGrcydyEaJMsJfqXQqJyJvVnqdaoDE"
          ACTUAL=$(solana-keygen pubkey relay_agent_registry/deploy/relay_agent_registry-keypair.json)
          echo "Expected: $EXPECTED"
          echo "Actual:   $ACTUAL"
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "ERROR: Program ID mismatch!"
            exit 1
          fi

      - name: Deploy program
        working-directory: programs
        run: |
          echo "Deploying to devnet..."
          solana program deploy \
            --program-id relay_agent_registry/deploy/relay_agent_registry-keypair.json \
            --keypair /tmp/payer.json \
            --url devnet \
            target/deploy/relay_agent_registry.so

      - name: Verify deployment
        run: |
          solana program show Hs1hX4pSZSAQKLgGrcydyEaJMsJfqXQqJyJvVnqdaoDE --url devnet

      - name: Clean up keypairs
        if: always()
        run: rm -f /tmp/payer.json
