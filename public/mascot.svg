<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Background glow gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#0a2040" stop-opacity="1" />
      <stop offset="70%" stop-color="#050f1e" stop-opacity="1" />
      <stop offset="100%" stop-color="#020810" stop-opacity="1" />
    </radialGradient>

    <!-- Speed streak gradient -->
    <linearGradient id="streakGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#00FFD1" stop-opacity="0" />
      <stop offset="100%" stop-color="#00FFD1" stop-opacity="0.8" />
    </linearGradient>

    <!-- Body gradient -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0d2236" />
      <stop offset="50%" stop-color="#0a1a2e" />
      <stop offset="100%" stop-color="#071422" />
    </linearGradient>

    <!-- Face gradient -->
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0e2540" />
      <stop offset="50%" stop-color="#0b1c31" />
      <stop offset="100%" stop-color="#071422" />
    </linearGradient>

    <!-- Eye glow gradient -->
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#00FFD1" stop-opacity="1" />
      <stop offset="60%" stop-color="#00c4a1" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#007a63" stop-opacity="0.3" />
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGlow)" />

  <!-- Speed streaks behind figure -->
  <g opacity="0.4" filter="url(#glow)">
    <rect x="10" y="88"  width="45" height="2"   rx="1" fill="url(#streakGrad)" />
    <rect x="5"  y="96"  width="55" height="1.5" rx="1" fill="url(#streakGrad)" />
    <rect x="15" y="104" width="38" height="1"   rx="1" fill="url(#streakGrad)" />
    <rect x="8"  y="112" width="48" height="2"   rx="1" fill="url(#streakGrad)" />
    <rect x="12" y="120" width="35" height="1"   rx="1" fill="url(#streakGrad)" />
  </g>

  <!-- Body -->
  <rect x="58" y="108" width="84" height="72" rx="14"
    fill="url(#bodyGrad)" stroke="#0d2236" stroke-width="1.5" />

  <!-- Circuit lines on body -->
  <g opacity="0.25" stroke="#00FFD1" stroke-width="0.8">
    <line x1="72" y1="120" x2="72" y2="135" />
    <line x1="72" y1="135" x2="82" y2="135" />
    <circle cx="82" cy="135" r="2" fill="#00FFD1" />
    <line x1="118" y1="120" x2="118" y2="140" />
    <line x1="118" y1="140" x2="108" y2="140" />
    <circle cx="108" cy="140" r="2" fill="#00FFD1" />
    <line x1="85" y1="155" x2="115" y2="155" />
    <circle cx="85"  cy="155" r="1.5" fill="#00FFD1" />
    <circle cx="100" cy="155" r="1.5" fill="#00FFD1" />
    <circle cx="115" cy="155" r="1.5" fill="#00FFD1" />
  </g>

  <!-- Chest glow panel -->
  <rect x="82" y="122" width="36" height="22" rx="5"
    fill="rgba(0,255,209,0.06)" stroke="rgba(0,255,209,0.2)" stroke-width="1" />
  <rect x="87" y="127" width="26" height="3" rx="1.5" fill="rgba(0,255,209,0.4)" />
  <rect x="87" y="133" width="18" height="3" rx="1.5" fill="rgba(0,255,209,0.25)" />

  <!-- Neck -->
  <rect x="88" y="98" width="24" height="14" rx="4"
    fill="#0a1a2a" stroke="#0d2236" stroke-width="1" />
  <line x1="94"  y1="101" x2="94"  y2="109" stroke="rgba(0,255,209,0.2)"  stroke-width="1" />
  <line x1="100" y1="100" x2="100" y2="110" stroke="rgba(0,255,209,0.15)" stroke-width="1" />
  <line x1="106" y1="101" x2="106" y2="109" stroke="rgba(0,255,209,0.2)"  stroke-width="1" />

  <!-- Left arm -->
  <rect x="30" y="112" width="32" height="18" rx="9"
    fill="url(#bodyGrad)" stroke="#0d2236" stroke-width="1.5" />
  <rect x="34" y="118" width="20" height="6" rx="3"
    fill="rgba(0,255,209,0.1)" />

  <!-- Right arm — raised/forward for speed -->
  <rect x="138" y="105" width="32" height="18" rx="9"
    fill="url(#bodyGrad)" stroke="#0d2236" stroke-width="1.5"
    transform="rotate(-15 154 114)" />
  <rect x="142" y="111" width="20" height="6" rx="3"
    fill="rgba(0,255,209,0.1)"
    transform="rotate(-15 154 114)" />

  <!-- Head -->
  <rect x="62" y="42" width="76" height="64" rx="22"
    fill="url(#faceGrad)" stroke="#0d2236" stroke-width="1.5" />

  <!-- Head top antenna -->
  <line x1="100" y1="42" x2="100" y2="28" stroke="#0d2236" stroke-width="2" />
  <circle cx="100" cy="24" r="5"
    fill="#060d1a" stroke="rgba(0,255,209,0.6)" stroke-width="1.5"
    filter="url(#glow)" />
  <circle cx="100" cy="24" r="2.5" fill="#00FFD1" filter="url(#glow)" />

  <!-- Side panels on head -->
  <rect x="62"  y="58" width="8" height="20" rx="4"
    fill="rgba(0,255,209,0.08)" stroke="rgba(0,255,209,0.15)" stroke-width="1" />
  <rect x="130" y="58" width="8" height="20" rx="4"
    fill="rgba(0,255,209,0.08)" stroke="rgba(0,255,209,0.15)" stroke-width="1" />

  <!-- Left eye -->
  <ellipse cx="84" cy="68" rx="10" ry="10"
    fill="#030912" stroke="rgba(0,255,209,0.3)" stroke-width="1" />
  <ellipse cx="84" cy="68" rx="6" ry="6" fill="url(#eyeGlow)" filter="url(#glow)" />
  <ellipse cx="84" cy="68" rx="3" ry="3" fill="#00FFD1" filter="url(#strongGlow)" />
  <ellipse cx="82" cy="66" rx="1.5" ry="1.5" fill="white" opacity="0.6" />

  <!-- Right eye -->
  <ellipse cx="116" cy="68" rx="10" ry="10"
    fill="#030912" stroke="rgba(0,255,209,0.3)" stroke-width="1" />
  <ellipse cx="116" cy="68" rx="6" ry="6" fill="url(#eyeGlow)" filter="url(#glow)" />
  <ellipse cx="116" cy="68" rx="3" ry="3" fill="#00FFD1" filter="url(#strongGlow)" />
  <ellipse cx="114" cy="66" rx="1.5" ry="1.5" fill="white" opacity="0.6" />

  <!-- Mouth — confident smirk -->
  <path d="M 88 86 Q 100 94 112 86"
    stroke="rgba(0,255,209,0.5)" stroke-width="2" fill="none"
    stroke-linecap="round" />

  <!-- Forehead accent line -->
  <line x1="88" y1="52" x2="112" y2="52"
    stroke="rgba(0,255,209,0.15)" stroke-width="1" />

  <!-- Motion particles -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="22" cy="85"  r="2"   fill="#00FFD1" />
    <circle cx="14" cy="100" r="1.5" fill="#00FFD1" opacity="0.5" />
    <circle cx="18" cy="115" r="1"   fill="#00FFD1" opacity="0.3" />
    <circle cx="30" cy="78"  r="1"   fill="#00FFD1" opacity="0.4" />
  </g>

  <!-- Relay "R" badge on chest -->
  <circle cx="100" cy="170" r="10"
    fill="rgba(0,255,209,0.08)" stroke="rgba(0,255,209,0.25)" stroke-width="1" />
  <text x="100" y="174" text-anchor="middle"
    font-size="10" font-weight="700" fill="#00FFD1"
    font-family="monospace">R</text>
</svg>
